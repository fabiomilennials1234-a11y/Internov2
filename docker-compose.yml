# Dev local. Prod usa Supabase (Postgres) + Redis no Easypanel.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interno
      POSTGRES_PASSWORD: interno
      POSTGRES_DB: interno
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interno"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  pg_data:
  redis_data:
